nelmio_cors:
    defaults:
        origin_regex: false
        allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'OPTIONS']
        allow_headers: ['Content-Type', 'Authorization', 'Accept', 'Origin']
        expose_headers: []
        max_age: 3600
    paths:
        '^/projects': null
